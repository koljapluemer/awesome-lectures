<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>

  <title>Not Authorized — Awesome Lectures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center text-gray-100 font-sans">

    <h1 class="text-2xl font-bold text-white mb-2">Not Authorized</h1>
