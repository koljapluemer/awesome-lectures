<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#39;Magic: the Gathering&#39;: 20 Years, 20 Lessons Learned — Awesome Lectures</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: var(--text); text-decoration: none; }
    header a:hover { color: var(--accent); text-decoration: none; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
    .search-trigger {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.25rem 0.6rem;
      border-radius: 0.375rem;
    }
    .search-trigger:hover { border-color: var(--accent); color: var(--accent); }
    .search-kbd {
      font-size: 0.7rem;
      background: var(--border);
      color: var(--text-muted);
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
    }
  </style>
  
</head>
<body>
  <header>
    <div class="inner">
      <a href="../" class="font-bold text-md">Awesome Lectures</a>
      <nav class="header-nav">
        <a href="../lectures/" class="text-sm">Browse</a>
        <a href="../search/" class="search-trigger" id="search-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
          <span class="search-kbd">⌘K</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    
<div class="container py-lg">
  <h1 class="text-2xl font-bold mt-md mb-sm">&#39;Magic: the Gathering&#39;: 20 Years, 20 Lessons Learned</h1>

  

  
  <div class="flex flex-wrap gap-sm mb-md">
    
    <span class="tag">game-design</span>
    
    <span class="tag">conference</span>
    
  </div>
  

  
  <div class="video-wrapper mb-lg">
    <iframe src="https://www.youtube.com/embed/QHHg99hwQGY"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
    </iframe>
  </div>
  

  <div class="card flex flex-col gap-sm">
    
    <div class="text-sm"><span class="text-muted">Worth watching without video:</span> 7/10</div>
    
    
    <div class="text-sm"><span class="text-muted">Beginner–expert level:</span> 5/10</div>
    
    
    <div class="text-sm"><span class="text-muted">Liked:</span> 100/100</div>
    
  </div>

  
  <h2 class="text-lg font-bold mt-lg mb-sm">Learnings</h2>
  <ul class="flex flex-col gap-sm" style="padding-left:1.25rem; list-style:disc;">
    
    
    <li class="text-sm"><span class="font-bold">make better games</span>: 8/10</li>
    
    <li class="text-sm"><span class="font-bold">how card games are designed</span>: 7/10</li>
    
    
  </ul>
  
</div>

  </main>

  <script>
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        window.location.href = '../search/';
      }
    });
  </script>
</body>
</html>
