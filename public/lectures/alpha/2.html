<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — Awesome Lectures</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: var(--text); text-decoration: none; }
    header a:hover { color: var(--accent); text-decoration: none; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
    .search-trigger {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.25rem 0.6rem;
      border-radius: 0.375rem;
    }
    .search-trigger:hover { border-color: var(--accent); color: var(--accent); }
    .search-kbd {
      font-size: 0.7rem;
      background: var(--border);
      color: var(--text-muted);
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
    }
  </style>
  
<style>
  .mode-nav { display: flex; gap: 0.5rem; }
  .mode-btn {
    font-size: 0.875rem;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    text-decoration: none;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .lecture-card { display: flex; gap: 1rem; align-items: center; color: inherit; text-decoration: none; }
  .lecture-card:hover { border-color: var(--accent); }
  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 2rem; }
  .pagination a { font-size: 0.875rem; }
  .pagination .page-info { font-size: 0.875rem; color: var(--text-muted); }
</style>

</head>
<body>
  <header>
    <div class="inner">
      <a href="../../" class="font-bold text-md">Awesome Lectures</a>
      <nav class="header-nav">
        <a href="../../lectures/random/" class="text-sm">Browse</a>
        <a href="../../search/" class="search-trigger" id="search-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
          <span class="search-kbd">⌘K</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    
<div class="container py-lg">
  <div class="flex items-center justify-between mb-lg">
    <h1 class="text-2xl font-bold">Browse</h1>
    <nav class="mode-nav">
      <a href="../../lectures/random/" class="mode-btn">Random</a>
      <a href="../../lectures/alpha/"  class="mode-btn active">A–Z</a>
      <a href="../../lectures/recent/" class="mode-btn">Recent</a>
    </nav>
  </div>

  <div class="flex flex-col gap-md">
    
    <a href="../../lectures/practice-of-art-8-.html" class="card lecture-card">
      
      <div>
        <div class="text-lg font-bold">Practice of Art</div>
        
        <div class="text-sm text-muted mt-sm">John S. McNamara</div>
        
        
        
      </div>
    </a>
    
    <a href="../../lectures/embodied-intelligence-mission.html" class="card lecture-card">
      
      <img src="../../thumbnails/TnGqodJc_Z4.webp" alt="" width="120" style="border-radius:0.375rem; flex-shrink:0; object-fit:cover;">
      
      <div>
        <div class="text-lg font-bold">The Next Horizon: Embodied Intelligence Mission</div>
        
        <div class="text-sm text-muted mt-sm">Prof. Leslie Kaelbling, Prof. Nancy Kanwisher</div>
        
        
        
      </div>
    </a>
    
    <a href="../../lectures/whats-up-with-ai.html" class="card lecture-card">
      
      <img src="../../thumbnails/F-OxHWWg59o.webp" alt="" width="120" style="border-radius:0.375rem; flex-shrink:0; object-fit:cover;">
      
      <div>
        <div class="text-lg font-bold">What&#39;s Up with AI?</div>
        
        <div class="text-sm text-muted mt-sm">Terry Winograd</div>
        
        
        
      </div>
    </a>
    
  </div>

  
  <div class="pagination">
    <a href="../../lectures/alpha/">&larr; Previous</a>
    <span class="page-info">2 / 2</span>
    <span></span>
  </div>
  
</div>

  </main>

  <script>
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        window.location.href = '../../search/';
      }
    });
  </script>
</body>
</html>
