<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Awesome Lectures</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: var(--text); text-decoration: none; }
    header a:hover { color: var(--accent); text-decoration: none; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
  </style>
  
<link href="../pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  .pagefind-ui {
    --pagefind-ui-primary: var(--accent);
    --pagefind-ui-text: var(--text);
    --pagefind-ui-background: var(--bg-card);
    --pagefind-ui-border: var(--border);
    --pagefind-ui-tag: var(--border);
  }
</style>

</head>
<body>
  <header>
    <div class="inner">
      <a href="../" class="font-bold text-md">Awesome Lectures</a>
      <nav class="header-nav">
        <a href="../lectures/random/" class="text-sm">Browse</a>
        <a href="../search/" class="text-sm">Search</a>
      </nav>
    </div>
  </header>

  <main>
    
<div class="container py-lg">
  <h1 class="text-2xl font-bold mb-lg">Search</h1>
  <div id="search"></div>
</div>
<script src="../pagefind/pagefind-ui.js"></script>
<script>new PagefindUI({ element: '#search', showImages: false });</script>

  </main>

</body>
</html>
