<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Lectures</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: var(--text); text-decoration: none; }
    header a:hover { color: var(--accent); text-decoration: none; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
    .search-trigger {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0.25rem 0.6rem;
      border-radius: 0.375rem;
    }
    .search-trigger:hover { border-color: var(--accent); color: var(--accent); }
    .search-kbd {
      font-size: 0.7rem;
      background: var(--border);
      color: var(--text-muted);
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
    }
  </style>
  
</head>
<body>
  <header>
    <div class="inner">
      <a href="" class="font-bold text-md">Awesome Lectures</a>
      <nav class="header-nav">
        <a href="lectures/" class="text-sm">Browse</a>
        <a href="search/" class="search-trigger" id="search-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
          <span class="search-kbd">⌘K</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    
<div class="container" style="min-height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
  <h1 class="text-2xl font-bold mb-sm">Awesome Lectures</h1>
  <p class="text-md text-muted mb-lg">A curated collection of talks worth watching.</p>
  <a href="lectures/" class="text-lg">Browse lectures &rarr;</a>
</div>

  </main>

  <script>
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        window.location.href = 'search/';
      }
    });
  </script>
</body>
</html>
