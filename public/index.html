<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Lectures</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a { color: var(--text); text-decoration: none; }
    header a:hover { color: var(--accent); text-decoration: none; }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
  </style>
  
</head>
<body>
  <header>
    <div class="inner">
      <a href="" class="font-bold text-md">Awesome Lectures</a>
      <nav class="header-nav">
        <a href="lectures/random/" class="text-sm">Browse</a>
        <a href="search/" class="text-sm">Search</a>
      </nav>
    </div>
  </header>

  <main>
    
<div class="container" style="min-height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
  <h1 class="text-2xl font-bold mb-sm">Awesome Lectures</h1>
  <p class="text-md text-muted mb-lg">A curated collection of talks worth watching.</p>
  <a href="lectures/random/" class="text-lg">Browse lectures &rarr;</a>
</div>

  </main>

</body>
</html>
